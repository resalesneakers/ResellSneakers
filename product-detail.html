<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto - ResellSneakers</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .product-page {
            padding: 6rem 1rem 2rem;
            background-color: #f9fafb;
            min-height: 100vh;
        }

        .product-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .product-gallery {
            background-color: white;
            padding: 1rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .main-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
        }

        .thumbnail-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }

        .thumbnail {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 0.375rem;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .thumbnail:hover {
            opacity: 0.8;
        }

        .product-info {
            background-color: white;
            padding: 2rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .product-header {
            margin-bottom: 1.5rem;
        }

        .product-header h1 {
            font-size: 2rem;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        .product-header p {
            color: #4b5563;
        }

        .product-price {
            font-size: 2rem;
            font-weight: 700;
            color: #dc2626;
            margin-bottom: 1.5rem;
        }

        .product-details {
            margin-bottom: 2rem;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #4b5563;
        }

        .detail-value {
            font-weight: 500;
        }

        .product-description {
            margin-bottom: 2rem;
        }

        .product-description h3 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
        }

        .product-description p {
            color: #4b5563;
            line-height: 1.6;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
        }

        .contact-button {
            flex: 1;
            padding: 1rem;
            background-color: #dc2626;
            color: white;
            border: none;
            border-radius: 0.375rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .contact-button:hover {
            background-color: #b91c1c;
        }

        @media (max-width: 768px) {
            .product-container {
                grid-template-columns: 1fr;
            }

            .action-buttons {
                flex-direction: column;
            }
        }

        .product-actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        .product-price {
            font-size: 2rem;
            font-weight: 600;
            color: #1f2937;
        }

        .chat-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            background-color: #dc2626;
            color: white;
            border: none;
            border-radius: 0.375rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .chat-button:hover {
            background-color: #b91c1c;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">Resell<span>Sneakers</span></a>
            <div class="nav-links">
                <a href="products.html">Produtos</a>
                <a href="sell.html">Vender</a>
                <a href="login.html" class="login-btn">Entrar</a>
                <a href="register.html" class="register-btn">Cadastrar</a>
            </div>
            <button class="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <div class="product-page">
        <div class="product-container">
            <div class="product-gallery">
                <img id="mainImage" class="main-image" src="" alt="Imagem do produto">
                <div class="thumbnail-grid" id="thumbnailGrid"></div>
            </div>
            <div class="product-info">
                <div class="product-header">
                    <h1 id="productName"></h1>
                    <p id="productBrand"></p>
                </div>
                <div class="product-actions">
                    <div class="product-price">R$ <span id="productPrice"></span></div>
                    <button id="chatButton" class="chat-button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        Conversar com o Vendedor
                    </button>
                </div>
                <div class="product-details">
                    <div class="detail-item">
                        <span class="detail-label">Tamanho</span>
                        <span class="detail-value" id="productSize"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Condição</span>
                        <span class="detail-value" id="productCondition"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Vendedor</span>
                        <span class="detail-value" id="productSeller"></span>
                    </div>
                </div>
                <div class="product-description">
                    <h3>Descrição</h3>
                    <p id="productDescription"></p>
                </div>
                <div class="action-buttons">
                    <button class="contact-button">Entrar em Contato</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, getDoc } from 'firebase/firestore';

        // Get product ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (!productId) {
            window.location.href = 'products.html';
        }

        // Fetch product data
        async function fetchProduct() {
            try {
                const productDoc = await getDoc(doc(db, 'products', productId));
                if (productDoc.exists()) {
                    const product = productDoc.data();
                    displayProduct(product);
                } else {
                    window.location.href = 'products.html';
                }
            } catch (error) {
                console.error('Error fetching product:', error);
                window.location.href = 'products.html';
            }
        }

        function displayProduct(product) {
            // Set product information
            document.getElementById('productName').textContent = product.name;
            document.getElementById('productBrand').textContent = product.brand;
            document.getElementById('productPrice').textContent = `R$ ${product.price.toFixed(2)}`;
            document.getElementById('productSize').textContent = product.size;
            document.getElementById('productCondition').textContent = getConditionText(product.condition);
            document.getElementById('productSeller').textContent = product.sellerName || 'Anônimo';
            document.getElementById('productDescription').textContent = product.description;

            // Set images
            const mainImage = document.getElementById('mainImage');
            const thumbnailGrid = document.getElementById('thumbnailGrid');

            if (product.images && product.images.length > 0) {
                mainImage.src = product.images[0];
                
                product.images.forEach((image, index) => {
                    const thumbnail = document.createElement('img');
                    thumbnail.src = image;
                    thumbnail.className = 'thumbnail';
                    thumbnail.alt = `Imagem ${index + 1}`;
                    thumbnail.onclick = () => {
                        mainImage.src = image;
                    };
                    thumbnailGrid.appendChild(thumbnail);
                });
            }
        }

        function getConditionText(condition) {
            const conditions = {
                'new': 'Novo',
                'like-new': 'Quase Novo',
                'good': 'Bom',
                'fair': 'Regular'
            };
            return conditions[condition] || condition;
        }

        // Initialize
        fetchProduct();

        // Mobile menu functionality
        const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
        const navLinks = document.querySelector('.nav-links');

        mobileMenuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            mobileMenuBtn.classList.toggle('active');
        });

        // Add chat button functionality
        document.getElementById('chatButton').addEventListener('click', async () => {
            if (!auth.currentUser) {
                alert('Você precisa estar logado para iniciar um chat');
                window.location.href = 'login.html';
                return;
            }

            const productId = urlParams.get('id');
            if (productId) {
                window.location.href = `chat.html?productId=${productId}`;
            }
        });
    </script>
</body>
</html>
